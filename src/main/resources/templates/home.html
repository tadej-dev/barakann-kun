<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>barakann-kun | ロードバイクバラ完シミュレータ</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-slate-50 text-slate-900">
<div th:replace="~{fragments/header :: siteHeader}"></div>

<main class="bg-white">
    <section
            class="flex min-h-[calc(100vh-64px)] w-full items-center justify-center bg-[radial-gradient(circle_at_top_left,rgba(14,165,233,0.14),transparent_34%)] px-8 py-20 text-center lg:px-16"
    >
        <div class="w-full max-w-5xl">
            <p
                    class="mb-5 text-xs font-extrabold uppercase tracking-widest text-sky-500"
            >
                Road bike build simulator
            </p>

            <h1
                    class="text-5xl font-extrabold leading-tight tracking-tight text-slate-900 sm:text-6xl lg:text-7xl"
            >
                <span class="block">理想の一台を、</span>
                <span class="block whitespace-nowrap">パーツから組み上げる。</span>
            </h1>

            <p
                    class="mx-auto mt-8 max-w-3xl text-base leading-8 text-slate-600 sm:text-lg"
            >
                <span class="block">フレーム、コンポ、ホイールを選びながら、</span>
                <span class="block">
              総額と重量をすぐに確認できる
              ロードバイクのバラ完シミュレータです。
            </span>
            </p>

            <div class="mt-10 flex justify-center">
                <a
                        class="inline-flex min-h-12 items-center justify-center rounded-xl bg-sky-500 px-7 text-sm font-extrabold text-white shadow-lg shadow-sky-500/20 hover:bg-sky-600"
                        th:href="@{/simulator}"
                >
                    シミュレーションを始める
                </a>
            </div>
        </div>
    </section>
</main>
</body>
</html>
